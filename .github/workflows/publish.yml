name: Publish SlackBlocks Python Package
on:
  push:
    tags:
      - "v*.*.*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Build Package
        run: uv build

      - name: Publish Package
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}